<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>
<body class="page-quiz">
<div class="app">

  <header class="app-header">
    <a href="index.html" class="logo">
      <img src="assets/logo.png" alt="QuizPlatform" class="logo-img" draggable="false" onerror="this.style.display='none'">
    </a>
    <span class="header-spacer"></span>
    <span id="mode-badge" class="badge" style="margin-right:6px;display:none;"></span>
    <button id="theme-toggle" class="btn-icon" title="Сменить тему"></button>
  </header>

  <main class="app-main" id="main-area">

    <!-- Sticky progress bar + finish action -->
    <div class="quiz-fixed-bar hidden" id="quiz-fixed-bar">
      <span class="quiz-fixed-title" id="quiz-title"></span>
      <span id="quiz-progress" class="text-sm text-muted"></span>
      <span id="quiz-timer" class="quiz-timer hidden"></span>
      <button class="btn btn-danger btn-sm" id="btn-finish-top">Завершить</button>
    </div>

    <!-- Loading -->
    <div id="screen-loading" style="padding:40px 0;">
      <div class="empty-state">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <p>Загрузка вопросов...</p>
      </div>
    </div>

    <!-- Quiz screen -->
    <div id="screen-quiz" class="hidden" style="padding-top:12px;">
      <div class="progress-bar mb-4">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>

      <div class="question-card" id="question-card">
        <span class="question-id-badge" id="question-id-badge"></span>
        <div class="question-text selectable" id="question-text"></div>
        <div class="options-grid" id="options-grid"></div>
      </div>

      <!-- Nav dots -->
      <div class="nav-dots-scroller">
        <button class="nav-dots-btn" id="nav-dots-prev" aria-label="Прокрутить назад">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="nav-dots-row" id="nav-dots-container"></div>
        <button class="nav-dots-btn" id="nav-dots-next" aria-label="Прокрутить вперёд">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>

      <div class="quiz-nav-row">
        <button class="btn btn-secondary" id="btn-prev">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Назад
        </button>
        <span class="text-sm text-muted" id="q-counter"></span>
        <button class="btn btn-secondary" id="btn-next">
          Далее
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>

    <!-- Results screen -->
    <div id="screen-results" class="hidden" style="padding-top:12px;">
      <div class="flex items-center justify-between mb-4" style="flex-wrap:wrap;gap:12px;">
        <h1>Результаты</h1>
        <div class="btn-group">
          <button class="btn btn-secondary" id="btn-retry">Повторить</button>
          <a href="index.html" class="btn btn-ghost">На главную</a>
        </div>
      </div>

      <div class="results-grid">
        <div class="card score-display glass">
          <div class="score-big" id="score-big">0%</div>
          <div class="score-label" id="score-label">0 из 0 верных</div>
          <div id="pass-badge" class="hidden mt-3"></div>
        </div>
        <div class="card glass">
          <h3 class="mb-3">История</h3>
          <div id="history-container"></div>
        </div>
      </div>

      <div id="mistakes-section" class="hidden mt-4">
        <h2 class="mb-3">Ошибки</h2>
        <div id="mistakes-list"></div>
      </div>
    </div>

  </main>
</div>

<!-- Finish confirmation modal -->
<div class="modal-backdrop hidden" id="finish-modal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2>Завершить тест?</h2>
    </div>
    <div class="modal-body">
      <p id="finish-modal-text" class="text-muted" style="font-size:0.9rem;"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="finish-cancel">Отмена</button>
      <button class="btn btn-danger" id="finish-confirm">Завершить</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="assets/quiz.js"></script>
<script>
/* ============================================================
   State
============================================================ */
let allQuestions   = [];
let sessionQuestions = [];
let currentIndex   = 0;
let userAnswers    = {};
let shuffledOptions = {};
let timerInterval  = null;
let timerRemaining = 0;
let subjectId      = null;
let subjectName    = '';

const params      = new URLSearchParams(location.search);
const paramSubject = params.get('subject');
const paramMode    = params.get('mode') || 'practice';
const paramCount   = parseInt(params.get('count'))   || null;
const paramShuffleQ = params.get('shuffleQ');
const paramShuffleA = params.get('shuffleA');
const paramTime     = parseInt(params.get('time')) || 60;
const paramImmFB    = params.get('immFB') === '1';
const paramAllQ     = params.get('allQ') === '1';

/* ============================================================
   Init
============================================================ */
document.addEventListener('DOMContentLoaded', async () => {
  QuizUtils.initTheme();

  if (!paramSubject) {
    location.href = 'index.html';
    return;
  }

  // Mode badge
  const badge = document.getElementById('mode-badge');
  badge.textContent = paramMode === 'exam' ? 'Экзамен' : 'Тренировка';
  badge.className = 'badge ' + (paramMode === 'exam' ? 'badge-danger' : 'badge-general');
  badge.style.display = '';

  document.getElementById('btn-finish-top').addEventListener('click', showFinishConfirm);
  document.getElementById('finish-cancel').addEventListener('click', hideFinishConfirm);
  document.getElementById('finish-confirm').addEventListener('click', () => { hideFinishConfirm(); finishQuiz(); });
  document.getElementById('btn-prev').addEventListener('click', () => navigate(-1));
  document.getElementById('btn-next').addEventListener('click', () => navigate(1));
  document.getElementById('btn-retry').addEventListener('click', () => location.reload());

  // Finish modal close on backdrop click
  document.getElementById('finish-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) hideFinishConfirm();
  });

  // Nav dots arrow buttons
  const _dotsRow = document.getElementById('nav-dots-container');
  document.getElementById('nav-dots-prev').addEventListener('click', () => {
    _dotsRow.scrollBy({ left: -5 * 42, behavior: 'smooth' });
  });
  document.getElementById('nav-dots-next').addEventListener('click', () => {
    _dotsRow.scrollBy({ left: 5 * 42, behavior: 'smooth' });
  });
  _dotsRow.addEventListener('scroll', updateNavArrows);

  try {
    const manifest = await QuizUtils.loadManifest();
    const subject  = manifest.subjects.find(s => s.id === paramSubject);
    if (!subject) { location.href = 'index.html'; return; }
    subjectId   = subject.id;
    subjectName = subject.name;
    document.title = subject.name;

    allQuestions = await QuizUtils.loadQuestions(subject.file);
    startQuiz();
  } catch (e) {
    document.getElementById('screen-loading').innerHTML =
      `<div class="card" style="border-color:var(--danger);margin-top:20px;"><p class="text-danger">Ошибка загрузки: ${e.message}</p><a href="index.html" class="btn btn-secondary mt-3">На главную</a></div>`;
  }
});

/* ============================================================
   Quiz start
============================================================ */
function startQuiz() {
  const savedSettings = QuizUtils.loadSettings('subject_' + subjectId);

  const shuffleQ = paramShuffleQ !== null ? paramShuffleQ === '1' : (savedSettings.shuffleQ !== undefined ? savedSettings.shuffleQ : true);
  const shuffleA = paramShuffleA !== null ? paramShuffleA === '1' : (savedSettings.shuffleA !== undefined ? savedSettings.shuffleA : true);
  const allQ     = paramAllQ || (savedSettings.allQ || false);
  const count    = allQ ? allQuestions.length : (paramCount !== null ? paramCount : (savedSettings.count || 20));

  let pool = [...allQuestions];
  if (shuffleQ) pool = QuizUtils.shuffleArray(pool);
  sessionQuestions = pool.slice(0, Math.min(count, pool.length));

  shuffledOptions = {};
  sessionQuestions.forEach((q, i) => {
    const keys = QuizUtils.getAnswerKeys(q);
    shuffledOptions[i] = shuffleA
      ? QuizUtils.shuffleArray(keys.map(k => ({ key: k, text: q[k] })))
      : keys.map(k => ({ key: k, text: q[k] }));
  });

  userAnswers  = {};
  currentIndex = 0;

  // Timer for exam mode
  clearInterval(timerInterval);
  const timerMinutes = paramTime;
  if (paramMode === 'exam') {
    timerRemaining = timerMinutes * 60;
    startTimer();
  } else {
    document.getElementById('quiz-timer').classList.add('hidden');
  }

  document.getElementById('screen-loading').classList.add('hidden');
  document.getElementById('screen-quiz').classList.remove('hidden');
  document.getElementById('quiz-fixed-bar').classList.remove('hidden');
  document.getElementById('quiz-title').textContent = subjectName;

  renderQuestion();
  renderNavDots();
}

/* ============================================================
   Render question
============================================================ */
function renderQuestion() {
  const q     = sessionQuestions[currentIndex];
  const total = sessionQuestions.length;

  document.getElementById('question-id-badge').textContent = q.id || '';
  document.getElementById('q-counter').textContent        = `${currentIndex + 1} / ${total}`;
  const answeredCount = Object.keys(userAnswers).length;
  document.getElementById('quiz-progress').textContent    = `${answeredCount}/${total}`;

  const pct = ((currentIndex + 1) / total) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';

  // Fade animation on question card
  const card = document.getElementById('question-card');
  card.classList.remove('fade-in');
  requestAnimationFrame(() => card.classList.add('fade-in'));

  // Question text (images can zoom)
  QuizUtils.renderContent(document.getElementById('question-text'), q['Вопрос'] || '');

  // Options — use positional labels A/B/C/D, track original keys internally
  const grid   = document.getElementById('options-grid');
  grid.innerHTML = '';
  const options = shuffledOptions[currentIndex];
  const chosen  = userAnswers[currentIndex];

  options.forEach(({ key, text }, idx) => {
    const displayLabel = ['A', 'B', 'C', 'D'][idx] || key;
    let isCorrectOpt = false;
    let isWrongOpt = false;
    if (paramMode === 'practice' && paramImmFB && chosen) {
      const correctKey = QuizUtils.normalizeAnswer(q['Правильный ответ']);
      if (key === correctKey) isCorrectOpt = true;
      if (key === chosen && chosen !== correctKey) isWrongOpt = true;
    }
    
    const item = document.createElement('div');
    item.className = 'option-item' 
      + (chosen === key ? ' selected' : '')
      + (isCorrectOpt ? ' correct' : '')
      + (isWrongOpt ? ' incorrect' : '');
    item.dataset.key = key;
    item.innerHTML = `
      <div class="option-key">${displayLabel}</div>
      <div class="option-label-text selectable" style="flex:1;font-size:0.875rem;"></div>
    `;
    // Images in options do NOT zoom (allowZoom = false)
    QuizUtils.renderContent(item.querySelector('.option-label-text'), text, false);
    item.addEventListener('click', () => selectAnswer(key));
    grid.appendChild(item);
  });

  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === total - 1;
}

function selectAnswer(key) {
  if (paramMode === 'practice' && paramImmFB && userAnswers[currentIndex]) return;
  userAnswers[currentIndex] = key;
  renderQuestion();
  renderNavDots();
}

function navigate(dir) {
  currentIndex = Math.max(0, Math.min(sessionQuestions.length - 1, currentIndex + dir));
  renderQuestion();
}

/* ============================================================
   Nav dots
============================================================ */
function renderNavDots() {
  const container = document.getElementById('nav-dots-container');
  container.innerHTML = '';
  sessionQuestions.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'nav-dot'
      + (i === currentIndex ? ' current' : '')
      + (userAnswers[i] !== undefined && i !== currentIndex ? ' answered' : '');
    dot.textContent = i + 1;
    dot.addEventListener('click', () => { currentIndex = i; renderQuestion(); renderNavDots(); });
    container.appendChild(dot);
  });
  container.querySelector('.nav-dot.current')?.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  updateNavArrows();
}

function updateNavArrows() {
  const row  = document.getElementById('nav-dots-container');
  const prev = document.getElementById('nav-dots-prev');
  const next = document.getElementById('nav-dots-next');
  if (!row || !prev || !next) return;
  prev.disabled = row.scrollLeft <= 2;
  next.disabled = row.scrollLeft >= row.scrollWidth - row.clientWidth - 2;
}

/* ============================================================
   Timer
============================================================ */
function startTimer() {
  const el = document.getElementById('quiz-timer');
  el.classList.remove('hidden');
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerRemaining--;
    updateTimerDisplay();
    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      QuizUtils.toast('Время вышло!', 'danger');
      finishQuiz();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById('quiz-timer');
  const m  = Math.floor(timerRemaining / 60).toString().padStart(2, '0');
  const s  = (timerRemaining % 60).toString().padStart(2, '0');
  el.textContent = `${m}:${s}`;
  el.className = 'quiz-timer'
    + (timerRemaining < 60  ? ' danger'  : '')
    + (timerRemaining < 180 && timerRemaining >= 60 ? ' warning' : '');
}

/* ============================================================
   Finish confirmation
============================================================ */
function showFinishConfirm() {
  const answered = Object.keys(userAnswers).length;
  const total    = sessionQuestions.length;
  document.getElementById('finish-modal-text').textContent =
    `Отвечено ${answered} из ${total} вопросов. Завершить тест?`;
  document.getElementById('finish-modal').classList.remove('hidden');
}

function hideFinishConfirm() {
  document.getElementById('finish-modal').classList.add('hidden');
}

/* ============================================================
   Finish & Results
============================================================ */
function finishQuiz() {
  clearInterval(timerInterval);
  document.getElementById('screen-quiz').classList.add('hidden');
  document.getElementById('quiz-fixed-bar').classList.add('hidden');

  let correct = 0;
  const mistakes = [];

  sessionQuestions.forEach((q, i) => {
    const chosen = userAnswers[i];
    const right  = QuizUtils.normalizeAnswer(q['Правильный ответ']);
    if (QuizUtils.normalizeAnswer(chosen) === right) {
      correct++;
    } else {
      mistakes.push({ q, chosen, right, index: i });
    }
  });

  const total   = sessionQuestions.length;
  const percent = total > 0 ? Math.round((correct / total) * 100) : 0;
  const passed  = percent >= 60;

  // Save full session history
  if (subjectId) {
    QuizUtils.saveHistory(subjectId, {
      date:            new Date().toISOString(),
      mode:            paramMode,
      percent,
      score:           correct,
      total,
      questions:       sessionQuestions,
      answers:         { ...userAnswers },
      shuffledOptions: JSON.parse(JSON.stringify(shuffledOptions)),
    });

    const answered = QuizUtils.loadAnswered(subjectId);
    sessionQuestions.forEach((q, i) => {
      if (QuizUtils.normalizeAnswer(userAnswers[i]) === QuizUtils.normalizeAnswer(q['Правильный ответ']) && q.id) {
        answered.add(q.id);
      }
    });
    QuizUtils.saveAnswered(subjectId, answered);
  }

  // Score display
  const scoreBig = document.getElementById('score-big');
  scoreBig.textContent = `${percent}%`;
  scoreBig.style.cssText = '';  // reset gradient clip
  if (percent >= 80) scoreBig.style.color = 'var(--success)';
  else if (percent >= 60) scoreBig.style.color = 'var(--warning)';
  else scoreBig.style.color = 'var(--danger)';

  document.getElementById('score-label').textContent = `${correct} из ${total} верных`;

  const badge = document.getElementById('pass-badge');
  badge.classList.remove('hidden');
  badge.innerHTML = passed
    ? `<span class="badge badge-success" style="font-size:0.85rem;padding:4px 14px;">Сдан</span>`
    : `<span class="badge badge-danger"  style="font-size:0.85rem;padding:4px 14px;">Не сдан</span>`;

  // History
  if (subjectId) QuizUtils.renderHistory(subjectId, document.getElementById('history-container'));

  // Mistakes
  if (mistakes.length > 0) {
    document.getElementById('mistakes-section').classList.remove('hidden');
    renderMistakes(mistakes);
  }

  document.getElementById('screen-results').classList.remove('hidden');
}

function renderMistakes(mistakes) {
  const list = document.getElementById('mistakes-list');
  list.innerHTML = '';

  mistakes.forEach(({ q, chosen, right, index }) => {
    const item   = document.createElement('div');
    item.className = 'mistake-item';

    const header = document.createElement('div');
    header.className = 'mistake-header';
    header.innerHTML = `
      <span class="badge badge-danger" style="flex-shrink:0;">№${index + 1}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" class="selectable"></span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;transition:transform 150ms ease;"><polyline points="6 9 12 15 18 9"/></svg>
    `;
    header.querySelector('span.selectable').textContent =
      String(q['Вопрос'] || '').replace(/<[^>]+>/g, '').trim().slice(0, 80) || `Вопрос ${index + 1}`;

    const body = document.createElement('div');
    body.className = 'mistake-body hidden';

    const opts = shuffledOptions[index] || QuizUtils.getAnswerKeys(q).map(k => ({ key: k, text: q[k] }));
    const optHtml = opts.map(({ key, text }, idx) => {
      const posLabel = ['A','B','C','D'][idx] || key;
      const isRight  = key === right;
      const isChosen = key === chosen;
      const cls = 'preview-option' + (isRight ? ' correct-opt' : '');
      const txt = String(text || '').replace(/<[^>]+>/g, '');
      return `<div class="${cls}">
        <span style="font-weight:700;min-width:20px;">${posLabel}</span>
        <span class="selectable" style="flex:1;">${isRight ? '<strong>' : ''}${txt}${isRight ? '</strong>' : ''}</span>
        ${isRight  ? '<span style="color:var(--success);font-size:0.72rem;font-weight:600;">верно</span>' : ''}
        ${isChosen && !isRight ? '<span style="color:var(--danger);font-size:0.72rem;font-weight:600;">ваш</span>' : ''}
      </div>`;
    }).join('');

    body.innerHTML = `
      <div class="question-text selectable mb-3"></div>
      <div class="preview-options">${optHtml}</div>
      <p class="text-sm text-muted mt-2">Верный: <strong class="text-success">${right}</strong>${chosen ? `, ваш: <strong class="text-danger">${chosen}</strong>` : ' (пропущен)'}</p>
    `;
    QuizUtils.renderContent(body.querySelector('.question-text'), q['Вопрос']);

    header.addEventListener('click', () => {
      body.classList.toggle('hidden');
      header.querySelector('svg').style.transform = body.classList.contains('hidden') ? '' : 'rotate(180deg)';
    });

    item.appendChild(header);
    item.appendChild(body);
    list.appendChild(item);
  });
}
</script>
</body>
</html>
